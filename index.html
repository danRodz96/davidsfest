<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>David Fest #29 - Cuenta Regresiva</title>
  <meta property="og:title" content="David Fest #29 - ¡Prepárate!">
  <meta property="og:description" content="Faltan pocos días Dickss!. ¡YAMEEEVIIII!">
  <meta property="og:image" content="flyer-neon.png">
  <meta property="og:type" content="website">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Russo+One&family=Permanent+Marker&display=swap');

    body {
      margin: 0;
      padding: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #fff;
      overflow: hidden;
      font-family: 'Russo One', sans-serif;
    }

    .flyer-container {
      position: relative;
      width: 100%;
      max-width: 500px;
      line-height: 0;
      transition: transform 0.1s ease-in-out;
    }

    .flyer-img {
      width: 100%;
      height: auto;
      display: block;
      box-shadow: 0 0 60px rgba(59, 130, 246, 0.4);
    }

    /* CONTENEDOR DEL CRONÓMETRO */
    #countdown-wrapper {
      position: absolute;
      top: 48.5%; 
      left: 50%;
      transform: translate(-50%, -50%);
      width: 85%;
      display: flex;
      justify-content: space-around;
      line-height: normal;
    }

    /* EFECTO BASS-BOOST RÍTMICO */
    .number {
      font-size: 2.3rem;
      font-weight: 700;
      color: #7dd3fc;
      letter-spacing: 2px;
      /* Animación que simula el golpe del bajo */
      animation: bass-boost 0.8s ease-in-out infinite alternate;
      display: inline-block;
    }

    @keyframes bass-boost {
      0% {
        text-shadow: 0 0 5px #3b82f6;
        transform: scale(0.95); /* Encogimiento previo al golpe */
        opacity: 0.7;
      }
      100% {
        text-shadow: 0 0 20px #3b82f6, 0 0 40px #f472b6;
        transform: scale(1.1); /* Golpe de bajo (expansión) */
        opacity: 1;
      }
    }

    /* BOTÓN DE MÚSICA */
    .audio-controls {
      position: fixed;
      bottom: 25px;
      right: 20px;
      z-index: 100;
    }

    #music-btn {
      background: rgba(0, 0, 0, 0.85);
      border: 2px solid #3b82f6;
      color: #7dd3fc;
      padding: 12px 20px;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 0 15px #3b82f6;
      font-size: 0.7rem;
      text-transform: uppercase;
      font-family: 'Russo One', sans-serif;
      transition: 0.3s;
    }

    #music-btn:hover {
      box-shadow: 0 0 25px #f472b6;
      border-color: #f472b6;
    }

    @media (max-width: 400px) {
      .number { font-size: 1.7rem; }
    }
  </style>
</head>
<body>

  <div class="flyer-container">
    <img src="flyer02.jpeg" alt="Flyer David Fest" class="flyer-img">

    <div id="countdown-wrapper">
      <div class="time-unit"><span class="number" id="days">00</span></div>
      <div class="time-unit"><span class="number" id="hours">00</span></div>
      <div class="time-unit"><span class="number" id="minutes">00</span></div>
      <div class="time-unit"><span class="number" id="seconds">00</span></div>
    </div>
  </div>

  <div class="audio-controls">
    <button id="music-btn">🔊 PLAY TECHNO</button>
  </div>

  <audio id="bg-music" loop autoplay>
    <source src="musicadavidfest.mp3" type="audio/mpeg">
  </audio>

  <script>
    const targetDate = new Date("2026-04-03T19:30:00-06:00").getTime();
    const musicBtn = document.getElementById('music-btn');
    const bgMusic = document.getElementById('bg-music');

    // Título Dinámico para la pestaña
    let originalTitle = document.title;
    window.addEventListener("blur", () => { document.title = "¡No te lo pierdas! ⚡"; });
    window.addEventListener("focus", () => { document.title = originalTitle; });

    const updateCountdown = () => {
      const now = new Date().getTime();
      const distance = targetDate - now;
      if (distance <= 0) {
        document.getElementById("countdown-wrapper").innerHTML = "<h2 style='color:#7dd3fc; font-family:Permanent Marker; text-shadow: 0 0 20px #f472b6; text-align:center; width:100%; font-size: 2.5rem;'>¡DALE!</h2>";
        return;
      }
      document.getElementById("days").innerText = Math.floor(distance / 86400000).toString().padStart(2, '0');
      document.getElementById("hours").innerText = Math.floor((distance % 86400000) / 3600000).toString().padStart(2, '0');
      document.getElementById("minutes").innerText = Math.floor((distance % 3600000) / 60000).toString().padStart(2, '0');
      document.getElementById("seconds").innerText = Math.floor((distance % 60000) / 1000).toString().padStart(2, '0');
    };

    // Forzar Play si el navegador lo permite
    window.addEventListener('load', () => {
      bgMusic.play().then(() => {
        musicBtn.innerText = "■ PAUSE";
      }).catch(() => {
        musicBtn.innerText = "▶ PLAY TECHNO";
      });
    });

    musicBtn.addEventListener('click', () => {
      if (bgMusic.paused) {
        bgMusic.play();
        musicBtn.innerText = "■ PAUSE";
      } else {
        bgMusic.pause();
        musicBtn.innerText = "▶ PLAY TECHNO";
      }
    });

    setInterval(updateCountdown, 1000);
    updateCountdown();
  </script>
</body>
</html>
